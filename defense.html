<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defense — SIONYX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="portal-page">

    <!-- YouTube fullscreen video -->
    <iframe
      class="portal-video"
      id="defense-video"
      src="https://www.youtube.com/embed/mqabWQaRXoI?autoplay=1&mute=1&controls=1&playsinline=1&rel=0&enablejsapi=1"
      allow="autoplay; fullscreen"
      allowfullscreen
    ></iframe>

    <!-- Dark overlay -->
    <div class="portal-overlay"></div>

    <!-- CTA button (fades in after 3s via JS) -->
    <a href="https://www.sionyx.com/collections/defense" class="portal-cta" id="portal-cta" target="_blank">
      Explore Defense
    </a>

    <!-- Back arrow -->
    <a href="index.html" class="back-btn">← Back</a>

  </div>

  <script src="script.js"></script>
  <script>
    // Fade in CTA after 3 seconds
    setTimeout(() => {
      const cta = document.getElementById('portal-cta');
      if (cta) cta.classList.add('visible');
    }, 3000);

    // Loop first 15 seconds using YouTube API
    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('defense-video', {
        events: {
          'onReady': function(e) {
            e.target.playVideo();
            setInterval(function() {
              if (player.getCurrentTime && player.getCurrentTime() >= 15) {
                player.seekTo(0);
              }
            }, 500);
          }
        }
      });
    }
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  </script>
</body>
</html>
